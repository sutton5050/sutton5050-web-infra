name: Teardown Sandbox

# Destroys BackendStack + FrontendStack. Reduces cost to ~$0.50/mo (Route53 only).
# Preserved: DnsStack, GlobalCertStack, NetworkStack, AuthStack, StorageStack, OidcStack.
# To rebuild after teardown, run the "Rebuild Sandbox" workflow.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY (all caps) to confirm stack deletion'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation input
        run: |
          if [[ "${{ inputs.confirm }}" != "DESTROY" ]]; then
            echo "::error::Confirmation failed — input was '${{ inputs.confirm }}', expected 'DESTROY'."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Teardown BackendStack + FrontendStack
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          SKIP_CONFIRM: 'true'
        run: ./scripts/sandbox-teardown.sh
