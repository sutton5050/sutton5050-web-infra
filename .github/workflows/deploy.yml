name: Deploy / Rebuild

# Builds and deploys any combination of infra / backend / frontend.
# Push to main auto-deploys everything (CDK diff + docker cache make the
# no-op case fast). Manual runs let you narrow the scope.

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      scope:
        description: What to deploy
        type: choice
        default: all
        options:
          - all
          - infra
          - backend
          - frontend

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: sutton5050-backend
  SCOPE: ${{ github.event.inputs.scope || 'all' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            frontend/package-lock.json

      - name: Install infra dependencies
        if: env.SCOPE == 'all' || env.SCOPE == 'infra' || env.SCOPE == 'backend' || env.SCOPE == 'frontend'
        run: npm ci
        working-directory: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------- Backend image ----------
      - name: Login to Amazon ECR
        if: env.SCOPE == 'all' || env.SCOPE == 'backend'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        if: env.SCOPE == 'all' || env.SCOPE == 'backend'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push backend/

      # ---------- CDK deploy ----------
      - name: CDK deploy (all stacks)
        if: env.SCOPE == 'all' || env.SCOPE == 'infra'
        env:
          SANDBOX_PASSWORD: ${{ secrets.SANDBOX_PASSWORD }}
        run: npx cdk deploy --all --require-approval never
        working-directory: infra

      - name: CDK deploy (BackendStack only)
        if: env.SCOPE == 'backend'
        env:
          SANDBOX_PASSWORD: ${{ secrets.SANDBOX_PASSWORD }}
        run: npx cdk deploy BackendStack --require-approval never
        working-directory: infra

      - name: CDK deploy (FrontendStack only)
        if: env.SCOPE == 'frontend'
        run: npx cdk deploy FrontendStack --require-approval never
        working-directory: infra

      # ---------- ECS force-redeploy ----------
      - name: Force new ECS deployment
        if: env.SCOPE == 'all' || env.SCOPE == 'backend'
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --service ${{ vars.ECS_SERVICE_NAME }} \
            --force-new-deployment

      - name: Wait for ECS service stable
        if: env.SCOPE == 'all' || env.SCOPE == 'backend'
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }}

      # ---------- Frontend build + sync ----------
      - name: Install frontend dependencies
        if: env.SCOPE == 'all' || env.SCOPE == 'frontend'
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        if: env.SCOPE == 'all' || env.SCOPE == 'frontend'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_APP_DOMAIN: ${{ vars.VITE_APP_DOMAIN }}
        run: npm run build

      - name: Sync frontend to S3
        if: env.SCOPE == 'all' || env.SCOPE == 'frontend'
        run: aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront
        if: env.SCOPE == 'all' || env.SCOPE == 'frontend'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
